<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Interview System</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 8px;
      background: #0f172a;
      color: white;
    }

    button {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      margin-right: 10px;
    }

    button:hover {
      background: #2563eb;
    }

    .results {
      margin-top: 10px;
      font-size: 14px;
    }

    .section {
      margin-top: 20px;
    }

    .questions {
      background: #020617;
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
    }

    .score {
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>AI Interview Assistant</h1>

    <!-- Resume Input -->
    <div class="card">
      <h3>Resume</h3>
      <textarea id="resumeText" rows="8" placeholder="Paste your resume..."></textarea>
    </div>

    <!-- Job Description -->
    <div class="card">
      <h3>Job Description</h3>
      <textarea id="jobDesc" rows="6" placeholder="Paste job description..."></textarea>
    </div>

    <!-- Actions -->
    <div class="card">
      <button id="analyzeBtn">Analyze Match</button>
      <button id="generateQuestionsBtn">Generate Interview</button>
    </div>

    <!-- Analysis -->
    <div class="card">
      <h3>Analysis</h3>
      <div class="score" id="scoreValue">—</div>
      <div class="results" id="matchedList"></div>
      <div class="results" id="missingList"></div>
      <div id="insightBox" hidden>
        <p id="insightText"></p>
      </div>
    </div>

    <!-- Questions -->
    <div class="card">
      <h3>Interview Questions</h3>

      <div class="section">
        <strong>Behavioral</strong>
        <div id="behavioralQ" class="questions"></div>
      </div>

      <div class="section">
        <strong>Cultural Fit</strong>
        <div id="culturalQ" class="questions"></div>
      </div>

      <div class="section">
        <strong>Technical</strong>
        <div id="technicalQ" class="questions"></div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
